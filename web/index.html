<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proto Forth WASM</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 20px;
      background: #10141c;
      color: #e8eef7;
    }
    h1 { margin-top: 0; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    textarea {
      width: 100%;
      min-height: 180px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: #0c1017;
      color: #dbe7f3;
      border: 1px solid #2c3545;
      border-radius: 8px;
      padding: 10px;
      box-sizing: border-box;
    }
    #repl, #sourcePane { min-height: 80px; }
    .block { margin-bottom: 16px; }
    .buttons { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    button {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #2c3545;
      background: #182233;
      color: #e8eef7;
      cursor: pointer;
    }
    button:hover { border-color: #73b7ff; }
    label { display: block; margin-bottom: 6px; font-weight: 600; }
    .note { color: #a9bbcf; font-size: 14px; margin-bottom: 16px; }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }

    .github-corner {
      position: absolute;
      top: 0;
      right: 0;
      z-index: 100;
    }
    .github-corner svg {
      fill: #73b7ff;
      color: #10141c;
    }
    .github-corner:hover .octo-arm {
      animation: octocat-wave 560ms ease-in-out;
    }
    @keyframes octocat-wave {
      0%, 100% { transform: rotate(0); }
      20%, 60% { transform: rotate(-25deg); }
      40%, 80% { transform: rotate(10deg); }
    }

    footer {
      margin-top: 28px;
      padding: 12px 0;
      border-top: 1px solid #2c3545;
      color: #6c7086;
      font-size: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    footer a {
      color: #73b7ff;
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }
    .footer-sep { color: #444; }
  </style>
</head>
<body>

     aria-label="View source on GitHub" target="_blank" rel="noopener">

      <path d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z"
            fill="currentColor"></path>
    </svg>
  </a>
  <h1>Proto Forth WASM</h1>
  <div class="note">
    Minimal plain HTML + JS + Rust/WASM prototype. Cmd-Enter or Ctrl-Enter runs the REPL.
  </div>

  <div class="block">
    <label for="repl">REPL</label>
    <textarea id="repl">2 DUP + .S</textarea>
    <div class="buttons">
      <button id="runBtn">Run REPL</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>

  <div class="block">
    <label for="sourcePane">Source</label>
    <textarea id="sourcePane">2 3 + .
4 DUP + .S</textarea>
    <div class="buttons">
      <button id="loadSourceBtn">Load Source</button>
    </div>
  </div>

  <div class="grid">
    <div>
      <label for="stackPane">Stack</label>
      <textarea id="stackPane" readonly></textarea>
    </div>
    <div>
      <label for="dictPane">Dictionary</label>
      <textarea id="dictPane" readonly></textarea>
    </div>
    <div>
      <label for="outputPane">Output</label>
      <textarea id="outputPane" readonly></textarea>
    </div>
    <div>
      <label for="historyPane">History</label>
      <textarea id="historyPane" readonly></textarea>
    </div>
    <div>
      <label for="tracePane">Trace</label>
      <textarea id="tracePane" readonly></textarea>
    </div>
  </div>

  <footer>
    <span>MIT License</span>
    <span class="footer-sep">&middot;</span>

    <a href="https://www.youtube.com/@SoftwareWrighter" target="_blank" rel="noopener">YouTube</a>
    <span class="footer-sep">&middot;</span>
    <a href="https://github.com/sw-vibe-coding/sw-fth-wasm/blob/main/CHANGES.md" target="_blank" rel="noopener">Changes</a>
    <span class="footer-sep">&middot;</span>
    <span>build
      <span id="build-host">__BUILD_HOST__</span>
      &middot;
      <span id="build-sha">__BUILD_SHA__</span>

  <script type="module" src="./main.js"></script>
</body>
</html>
